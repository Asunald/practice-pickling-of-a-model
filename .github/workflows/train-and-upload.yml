name: 训练模型并上传到Huggingface

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

jobs:
  train-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 训练模型
        run: |
          python train.py
      
      - name: 上传模型到Huggingface
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python upload_to_hf.py
      
      - name: 获取时间戳
        id: timestamp
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
      
      - name: 创建Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.timestamp.outputs.time }}
          name: 模型发布 v${{ steps.timestamp.outputs.time }}
          body: |
            🤖 自动训练并发布模型
            
            📅 训练时间: ${{ steps.timestamp.outputs.time }}
            🔗 Huggingface模型: https://huggingface.co/Asunald/practice-pickling-of-a-model
            
            ## 模型文件
            - student_score_predictor.pkl
            - README.md
          files: |
            model/student_score_predictor.pkl
            model/README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
